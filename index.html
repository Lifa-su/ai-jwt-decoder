<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder - Decode and Verify JWT Tokens</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
.container{max-width:900px;margin:0 auto;padding:20px;width:100%;flex:1}
h1{text-align:center;font-size:2rem;margin:30px 0 8px;background:linear-gradient(135deg,#00d2ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{text-align:center;color:#888;margin-bottom:30px;font-size:.95rem}
label{display:block;font-weight:600;margin-bottom:8px;color:#ccc;font-size:.9rem}
textarea{width:100%;height:120px;background:#16213e;border:1px solid #333;border-radius:10px;padding:14px;color:#e0e0e0;font-family:'Courier New',monospace;font-size:.85rem;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:#7b2ff7}
.btns{display:flex;gap:10px;margin:10px 0 24px;flex-wrap:wrap}
button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s}
.be{background:linear-gradient(135deg,#00d2ff,#7b2ff7);color:#fff}
.be:hover{opacity:.85;transform:translateY(-1px)}
.bc{background:#2a2a4a;color:#aaa;border:1px solid #444}
.bc:hover{background:#333;color:#ccc}
.err{background:#ff475722;border:1px solid #ff4757;color:#ff6b81;padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:.9rem;display:none}
.badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:.8rem;font-weight:700;margin-bottom:16px}
.bv{background:#00b89422;color:#00b894;border:1px solid #00b89455}
.bx{background:#ff475722;color:#ff4757;border:1px solid #ff475755}
.bn{background:#fdcb6e22;color:#fdcb6e;border:1px solid #fdcb6e55}
.res{display:none}
.sec{background:#16213e;border:1px solid #2a2a4a;border-radius:12px;padding:20px;margin-bottom:16px}
.st{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dh{background:#00d2ff}.dp{background:#7b2ff7}
pre{background:#0f0f23;border-radius:8px;padding:16px;overflow-x:auto;font-size:.82rem;line-height:1.6;font-family:'Courier New',monospace}
.jk{color:#7b2ff7}.js{color:#00d2ff}.jn{color:#fdcb6e}.jb{color:#ff6b81}.jl{color:#888}.jt{color:#00b894;font-size:.75rem;font-style:italic}
footer{text-align:center;padding:20px;color:#555;font-size:.75rem;border-top:1px solid #222}
@media(max-width:600px){.container{padding:14px}h1{font-size:1.5rem}textarea{height:100px;font-size:.78rem}pre{font-size:.75rem;padding:12px}.btns{flex-direction:column}button{width:100%}}
</style>
</head>
<body>
<div class="container">
<h1>&#128272; JWT Decoder</h1>
<p class="sub">Paste a JWT token to instantly decode and verify</p>
<label for="ti">JWT Token</label>
<textarea id="ti" placeholder="Paste your JWT token here..." spellcheck="false"></textarea>
<div class="btns">
<button class="be" onclick="loadEx()">&#128203; Example JWT</button>
<button class="bc" onclick="clr()">&#10005; Clear</button>
</div>
<div class="err" id="err" role="alert"></div>
<div class="res" id="res">
<div id="sc" style="text-align:center"></div>
<div class="sec"><div class="st"><span class="dot dh"></span> Header</div><pre id="ho"></pre></div>
<div class="sec"><div class="st"><span class="dot dp"></span> Payload</div><pre id="po"></pre></div>
</div>
</div>
<footer>JWT Decoder &mdash; All decoding happens in your browser. No data is sent to any server.</footer>
<script>
var TF=['iat','exp','nbf','auth_time','updated_at','created_at'];
function b64d(s){
s=s.replace(/-/g,'+').replace(/_/g,'/');
while(s.length%4)s+='=';
try{return decodeURIComponent(atob(s).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join(''))}
catch(e){return atob(s)}
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hl(obj){
var j=JSON.stringify(obj,null,2),r='',lines=j.split('\n');
for(var i=0;i<lines.length;i++){
var l=lines[i],m=l.match(/^(\s*)"([^"]+)"\s*:\s*(.+?)(,?)$/);
if(m){
var sp=m[1],k=m[2],v=m[3].trim(),cm=m[4]||'';
if(cm&&v.endsWith(','))v=v.slice(0,-1);
var vh;
if(v.charAt(0)==='"')vh='<span class="js">'+esc(v)+'</span>';
else if(v==='true'||v==='false')vh='<span class="jb">'+v+'</span>';
else if(v==='null')vh='<span class="jl">null</span>';
else if(!isNaN(Number(v))){
vh='<span class="jn">'+v+'</span>';
if(TF.indexOf(k)!==-1){var d=new Date(Number(v)*1000);vh+=' <span class="jt">\u2190 '+esc(d.toLocaleString())+'</span>'}
}else vh=esc(v);
r+=sp+'<span class="jk">"'+esc(k)+'"</span>: '+vh+cm+'\n';
}else r+=esc(l)+'\n';
}return r;
}
function decode(t){
var el=document.getElementById('err'),rl=document.getElementById('res'),sc=document.getElementById('sc');
el.style.display='none';rl.style.display='none';sc.innerHTML='';
t=t.trim();if(!t)return;
var parts=t.split('.');
if(parts.length<2||parts.length>3){el.textContent='Invalid JWT: expected 2 or 3 dot-separated parts, got '+parts.length;el.style.display='block';return}
try{var header=JSON.parse(b64d(parts[0]))}catch(e){el.textContent='Failed to decode header: '+e.message;el.style.display='block';return}
try{var payload=JSON.parse(b64d(parts[1]))}catch(e){el.textContent='Failed to decode payload: '+e.message;el.style.display='block';return}
document.getElementById('ho').innerHTML=hl(header);
document.getElementById('po').innerHTML=hl(payload);
if(typeof payload.exp==='number'){
var now=Math.floor(Date.now()/1000);
if(now<payload.exp){sc.innerHTML='<span class="badge bv">\u2705 Valid \u2014 expires '+new Date(payload.exp*1000).toLocaleString()+'</span>'}
else{sc.innerHTML='<span class="badge bx">\u274c Expired \u2014 '+new Date(payload.exp*1000).toLocaleString()+'</span>'}
}else{sc.innerHTML='<span class="badge bn">\u26a0 No expiration claim</span>'}
rl.style.display='block';
}
function loadEx(){
var now=Math.floor(Date.now()/1000);
var h=btoa(JSON.stringify({alg:'HS256',typ:'JWT'})).replace(/=/g,'');
var p=btoa(JSON.stringify({sub:'1234567890',name:'John Doe',email:'john@example.com',role:'admin',iss:'https://auth.example.com',aud:'my-app',iat:now-3600,nbf:now-3600,exp:now+3600})).replace(/=/g,'');
document.getElementById('ti').value=h+'.'+p+'.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c';
decode(document.getElementById('ti').value);
}
function clr(){document.getElementById('ti').value='';document.getElementById('err').style.display='none';document.getElementById('res').style.display='none'}
var timer;
document.getElementById('ti').addEventListener('input',function(){clearTimeout(timer);timer=setTimeout(function(){decode(document.getElementById('ti').value)},300)});
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
