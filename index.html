<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI JWT Decoder - JWT Token 在线解码工具</title>
<meta name="description" content="免费在线JWT Token解码器，实时解析Header、Payload、Signature，检测过期时间。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:20px 16px 60px}
h1{text-align:center;font-size:1.8rem;margin-bottom:6px;color:#e94560}
.subtitle{text-align:center;color:#888;font-size:.9rem;margin-bottom:24px}
.input-section{margin-bottom:24px}
.input-section label{display:block;font-weight:600;margin-bottom:8px;color:#c0c0c0}
textarea{width:100%;height:120px;background:#16213e;border:2px solid #0f3460;border-radius:8px;color:#e0e0e0;padding:12px;font-family:'Courier New',monospace;font-size:.85rem;resize:vertical;transition:border-color .2s}
textarea:focus{outline:none;border-color:#e94560}
textarea::placeholder{color:#555}
.error{background:#2d1525;border:1px solid #e94560;color:#ff6b8a;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none}
.result-section{display:none}
.part{margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid #0f3460}
.part-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;font-weight:700}
.copy-btn{background:none;border:1px solid rgba(255,255,255,.2);color:#ccc;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:.8rem;transition:all .2s}
.copy-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.part-body{padding:14px 16px;background:#16213e;font-family:'Courier New',monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all}
.header-part .part-header{background:#0f3460;color:#53d8fb}
.payload-part .part-header{background:#1b4332;color:#95d5b2}
.signature-part .part-header{background:#4a1942;color:#d4a5d0}
.header-part .part-body{color:#7ec8e3}
.payload-part .part-body{color:#b7e4c7}
.signature-part .part-body{color:#d4a5d0}
.exp-banner{padding:12px 16px;border-radius:8px;margin-bottom:20px;font-weight:600;display:none}
.exp-valid{background:#1b4332;border:1px solid #2d6a4f;color:#95d5b2}
.exp-expired{background:#3d1a1a;border:1px solid #8b2020;color:#ff8a8a}
@media(max-width:600px){
h1{font-size:1.4rem}
.container{padding:14px 10px 50px}
textarea{height:100px;font-size:.78rem}
.part-body{font-size:.78rem;padding:10px 12px}
}
</style>
</head>
<body>
<div class="container">
<h1>🔐 AI JWT Decoder</h1>
<p class="subtitle">粘贴 JWT Token，实时解码 Header / Payload / Signature</p>
<div class="input-section">
<label for="jwt-input">JWT Token</label>
<textarea id="jwt-input" placeholder="粘贴你的 JWT Token（eyJhbGciOi...）" spellcheck="false"></textarea>
</div>
<div class="error" id="error"></div>
<div class="exp-banner" id="exp-banner"></div>
<div class="result-section" id="results">
<div class="part header-part">
<div class="part-header"><span>📋 Header</span><button class="copy-btn" onclick="copyPart('header-body')">复制</button></div>
<div class="part-body" id="header-body"></div>
</div>
<div class="part payload-part">
<div class="part-header"><span>📦 Payload</span><button class="copy-btn" onclick="copyPart('payload-body')">复制</button></div>
<div class="part-body" id="payload-body"></div>
</div>
<div class="part signature-part">
<div class="part-header"><span>🔑 Signature</span><button class="copy-btn" onclick="copyPart('sig-body')">复制</button></div>
<div class="part-body" id="sig-body"></div>
</div>
</div>
</div>
<script>
function b64urlDecode(s){
s=s.replace(/-/g,'+').replace(/_/g,'/');
while(s.length%4)s+='=';
try{return decodeURIComponent(atob(s).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join(''));}
catch(e){return atob(s);}
}
function formatTime(ts){
var d=new Date(ts*1000);
return d.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
function humanDur(ms){
var s=Math.floor(Math.abs(ms)/1000);
if(s<60)return s+'秒';
var m=Math.floor(s/60);
if(m<60)return m+'分钟';
var h=Math.floor(m/60);
if(h<24)return h+'小时'+(m%60?' '+m%60+'分钟':'');
var d=Math.floor(h/24);
return d+'天'+(h%24?' '+h%24+'小时':'');
}
var timeKeys=['exp','iat','nbf','auth_time','updated_at','created_at'];
function annotate(obj){
var t=JSON.stringify(obj,null,2);
timeKeys.forEach(function(k){
if(obj[k]&&typeof obj[k]==='number'&&obj[k]>1e9&&obj[k]<2e10){
t=t.replace(new RegExp('("'+k+'":\\s*)(\\d+)'),'$1$2  ← '+formatTime(obj[k]));
}
});
return t;
}
function copyPart(id){
var text=document.getElementById(id).textContent;
navigator.clipboard.writeText(text).then(function(){
event.target.textContent='已复制✓';
setTimeout(function(){event.target.textContent='复制';},1500);
});
}
function decode(){
var el=document.getElementById('jwt-input');
var err=document.getElementById('error');
var res=document.getElementById('results');
var ban=document.getElementById('exp-banner');
var token=el.value.trim();
if(!token){err.style.display='none';res.style.display='none';ban.style.display='none';return;}
var parts=token.split('.');
if(parts.length!==3){
err.textContent='❌ 无效的 JWT 格式：需要三段由 . 分隔的字符串';
err.style.display='block';res.style.display='none';ban.style.display='none';return;
}
try{
var header=JSON.parse(b64urlDecode(parts[0]));
var payload=JSON.parse(b64urlDecode(parts[1]));
}catch(e){
err.textContent='❌ 解码失败：Base64 或 JSON 解析错误';
err.style.display='block';res.style.display='none';ban.style.display='none';return;
}
err.style.display='none';
document.getElementById('header-body').textContent=JSON.stringify(header,null,2);
document.getElementById('payload-body').textContent=annotate(payload);
document.getElementById('sig-body').textContent=parts[2];
res.style.display='block';
if(payload.exp){
var now=Date.now();
var expMs=payload.exp*1000;
var diff=expMs-now;
if(diff>0){
ban.className='exp-banner exp-valid';
ban.textContent='✅ Token 有效 — 将在 '+humanDur(diff)+' 后过期（'+formatTime(payload.exp)+'）';
}else{
ban.className='exp-banner exp-expired';
ban.textContent='❌ Token 已过期 — 过期于 '+humanDur(diff)+' 前（'+formatTime(payload.exp)+'）';
}
ban.style.display='block';
}else{
ban.style.display='none';
}
}
document.getElementById('jwt-input').addEventListener('input',decode);
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
